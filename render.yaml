services:
  - type: web
    name: oficina-ademar
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        value: 123456
databases:
  - name: oficina-ademar-db
    plan: free
