<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AUTO MECÂNICA ADEMAR</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
{% if session.get("logado") %}
<header class="top">
  <div class="brand">
    <div class="logo">🚗</div>
    <div>
      <h1>AUTO MECÂNICA ADEMAR</h1>
      <p>MECÂNICA EM GERAL</p>
    </div>
  </div>
  <nav>
    <a href="/">INÍCIO</a><a href="/clientes">CLIENTES</a><a href="/veiculos">VEÍCULOS</a>
    <a href="/orcamentos">ORÇAMENTOS</a><a href="/ordens-servico">ORDEM DE SERVIÇO</a><a href="/financeiro">FINANCEIRO</a><a href="/relatorios">RELATÓRIOS</a><a href="/backup">BACKUP</a>
    <a href="/logout">SAIR</a>
  </nav>
</header>
{% endif %}
<main class="wrap">{% block content %}{% endblock %}</main>
<script>
document.querySelectorAll('input[type=text], textarea').forEach(el=>{
  el.addEventListener('input',()=>{ let p=el.selectionStart; el.value=el.value.toUpperCase(); el.selectionStart=el.selectionEnd=p; });
});
</script>



<script>
function aplicarPrivacidadeGlobal(){
  const ocultar = localStorage.getItem("ocultarValores") === "sim";
  document.querySelectorAll(".valor-financeiro").forEach(el=>{
    if(!el.dataset.real || el.dataset.real.includes("•••••")){
      el.dataset.real = el.textContent.trim();
    }
    el.textContent = ocultar ? "R$ •••••" : el.dataset.real;
  });
  document.querySelectorAll(".btn-olho-valores").forEach(btn=>{
    btn.textContent = ocultar ? "🙈 MOSTRAR VALORES" : "👁️ OCULTAR VALORES";
  });
}
function alternarPrivacidade(){
  const ocultar = localStorage.getItem("ocultarValores") === "sim";
  localStorage.setItem("ocultarValores", ocultar ? "nao" : "sim");
  aplicarPrivacidadeGlobal();
}
document.addEventListener("DOMContentLoaded", aplicarPrivacidadeGlobal);
setTimeout(aplicarPrivacidadeGlobal, 200);
</script>

</body></html>
