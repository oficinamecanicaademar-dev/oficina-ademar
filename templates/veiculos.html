{% extends "base.html" %}{% block content %}
<div class="grid"><div class="card auto"><h2>CADASTRAR VEÍCULO</h2><form method="post"><label>CLIENTE</label><select name="cliente_id">{% for c in clientes %}<option value="{{c.id}}">{{c.nome}}</option>{% endfor %}</select><label>MODELO</label><input name="modelo" required><label>PLACA</label><input name="placa"><label>ANO</label><input name="ano"><label>COR</label><input name="cor"><button>SALVAR</button></form></div>
<div class="card"><h2>VEÍCULOS</h2><table><tr><th>CLIENTE</th><th>VEÍCULO</th><th>PLACA</th><th>AÇÃO</th></tr>{% for v in veiculos %}<tr><td>{{v.cliente}}</td><td>{{v.modelo}}</td><td>{{v.placa}}</td><td><a class="btn gray" href="/veiculos/excluir/{{v.id}}" onclick="return confirm('EXCLUIR VEÍCULO?')">EXCLUIR</a></td></tr>{% endfor %}</table></div></div>{% endblock %}
