{% extends "base.html" %}{% block content %}
<div class="card auto"><h2>FINANCEIRO</h2><form method="post"><div class="grid"><div><label>DATA</label><input type="date" name="data" required></div><div><label>TIPO</label><select name="tipo"><option>ENTRADA</option><option>SAÍDA</option></select></div><div><label>DESCRIÇÃO</label><input name="descricao"></div><div><label>VALOR</label><input name="valor"></div><div><label>FORMA</label><select name="forma"><option>PIX</option><option>DINHEIRO</option><option>DÉBITO</option><option>CRÉDITO</option></select></div><div><label>STATUS</label><select name="status"><option>PAGO</option><option>PENDENTE</option></select></div></div><button>LANÇAR</button></form></div>
<div class="card"><table><tr><th>DATA</th><th>TIPO</th><th>DESCRIÇÃO</th><th>FORMA</th><th>PARCELA</th><th>VALOR</th><th>STATUS</th><th>AÇÕES</th></tr>{% for i in itens %}<tr><td>{{i.data}}</td><td>{{i.tipo}}</td><td>{{i.descricao}}</td><td>{{i.forma}}</td><td>{{i.parcela_num or '-'}}/{{i.parcelas_total or '-'}}</td><td>{{brl(i.valor)}}</td><td>{{i.status}}</td><td><a class="btn green" href="/financeiro/pago/{{i.id}}">PAGO</a><a class="btn gray" href="/financeiro/excluir/{{i.id}}" onclick="return confirm('EXCLUIR LANÇAMENTO?')">EXCLUIR</a></td></tr>{% endfor %}</table></div>{% endblock %}
